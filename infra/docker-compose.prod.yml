version: '3.8'

# Production Docker Compose
# Use with: docker-compose -f infra/docker-compose.prod.yml up

services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:15-alpine
    container_name: courierx-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-courierx}
      POSTGRES_USER: ${POSTGRES_USER:-courierx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courierx"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - courierx-network
    restart: unless-stopped

  # Redis (Production)
  redis:
    image: redis:7-alpine
    container_name: courierx-redis-prod
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - courierx-network
    restart: unless-stopped

  # Rails Control Plane (Production)
  control-plane:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.rails
    container_name: courierx-control-plane-prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: production
      PORT: 4000
      GO_CORE_URL: ${GO_CORE_URL:-http://core-go:8080}
      GO_CORE_SECRET: ${GO_CORE_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - courierx-network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Go Core (Production)
  core-go:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.go
    container_name: courierx-core-go-prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      PORT: 8080
      GO_ENV: production
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-http://control-plane:4000}
      CONTROL_PLANE_SECRET: ${GO_CORE_SECRET}
      LOG_LEVEL: info
      MAX_WORKERS: 200
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - courierx-network
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 512M

  # Sidekiq (Production)
  sidekiq:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.rails
    container_name: courierx-sidekiq-prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - courierx-network
    restart: unless-stopped
    command: bundle exec sidekiq -C config/sidekiq.yml
    deploy:
      replicas: 2

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: courierx-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - control-plane
      - core-go
    networks:
      - courierx-network
    restart: unless-stopped

networks:
  courierx-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
