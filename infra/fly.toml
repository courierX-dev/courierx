# CourierX Control Plane — Fly.io deployment
# Deploy: fly deploy --config infra/fly.toml
# See also: fly.core.toml for the Go engine

app = "courierx-control-plane"
primary_region = "iad"

[build]
  dockerfile = "infra/docker/Dockerfile.rails"

[env]
  RAILS_ENV = "production"
  PORT = "4000"
  GO_CORE_URL = "http://courierx-core.internal:8080"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Sidekiq process group — runs in the same app as a separate process
# fly scale count sidekiq=1
[processes]
  app = "bundle exec rails server -b 0.0.0.0 -p 4000"
  sidekiq = "bundle exec sidekiq"
