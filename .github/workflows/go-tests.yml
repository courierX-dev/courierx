name: Go Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/core-go/**'
      - '.github/workflows/go-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/core-go/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: courierx
          POSTGRES_PASSWORD: password
          POSTGRES_DB: courierx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://courierx:password@localhost:5432/courierx_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: apps/core-go/go.sum

      - name: Install dependencies
        working-directory: apps/core-go
        run: go mod download

      - name: Run tests
        working-directory: apps/core-go
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Generate coverage report
        working-directory: apps/core-go
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/core-go/coverage.out
          flags: go
          name: go-coverage

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: apps/core-go

      - name: Run gosec (Security)
        working-directory: apps/core-go
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        working-directory: apps/core-go
        run: go build -v -o courierx-core .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: courierx-core
          path: apps/core-go/courierx-core
